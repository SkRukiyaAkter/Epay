services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epayment-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - epayment-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epayment-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      - API_BASE_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - epayment-net

  redis:
    image: redis:7-alpine
    container_name: epayment-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - epayment-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: epayment-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - epayment-net

networks:
  epayment-net:
    driver: bridge

volumes:
  redis-data:
